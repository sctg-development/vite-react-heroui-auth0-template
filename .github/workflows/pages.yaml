name: GHRelease

on:
  push:
    branches:
      - main
    paths:
      - apps/client/**
      - yarn.lock
      - .github/workflows/pages.yaml
      - .github/workflows/create-env-artifact.yaml

  #   release:
  #     types: [published]
  #   schedule:
  #     - cron: '0 0 * * 0' # every Sunday at midnight
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  packages: write
  attestations: write

jobs:
  create-env:
    uses: ./.github/workflows/create-env-artifact.yaml
    secrets: inherit

  build:
    runs-on: ubuntu-latest
    needs: create-env

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache Turborepo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: |
          npm i

      - name: Download shared .env artifact
        uses: actions/download-artifact@v5
        with:
          name: shared-env
          path: .

      # .env.enc was encrypted with openssl enc -aes-256-cbc -salt -in env_and_wrangler.tar.gz -out .env.enc -iter 10000 -pass pass:"${{ secrets.CRYPTOKEN }}"
      # Decrypt it using the same key and parameters
      - name: Decrypt .env + wrangler.jsonc artifact
        run: |
          openssl enc -aes-256-cbc -d -salt -in .env.enc -out env_and_wrangler.tar.gz -iter 10000 -pass pass:"${{ secrets.CRYPTOKEN }}"
          tar -xzvf env_and_wrangler.tar.gz
          rm env_and_wrangler.tar.gz .env.enc
          if [ ! -f .env ]; then
            echo "Decrypted artifact does not contain .env"
            exit 1
          fi

      - name: Build project
        # You can change the base path to your repository name
        run: |
          source .env
          export NODE_ENV=production
          npm run build:env -- --base="/${{ github.event.repository.name }}/"

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          # Upload docs directory
          path: "apps/client/dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
