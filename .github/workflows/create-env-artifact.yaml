name: Create shared encrypted .env artifact

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  create-env:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"
          fetch-depth: 1

      - name: Create .env file
        run: |
          echo -n ${{ secrets.AUTH0_AUDIENCE }} | sed -n 's/http.:\/\/\(.*\)/DOMAIN_NAME=\1\n/p' > .env
          echo "CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" >> .env
          echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}" >> .env
          echo "AUTHENTICATION_PROVIDER_TYPE=${{ secrets.AUTHENTICATION_PROVIDER_TYPE }}" >> .env
          echo "AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }}" >> .env
          echo "AUTH0_CLIENT_ID=${{ secrets.AUTH0_CLIENT_ID }}" >> .env
          echo "AUTH0_CLIENT_SECRET=${{ secrets.AUTH0_CLIENT_SECRET }}" >> .env
          echo "AUTH0_MANAGEMENT_API_CLIENT_ID=${{ secrets.AUTH0_MANAGEMENT_API_CLIENT_ID }}" >> .env
          echo "AUTH0_MANAGEMENT_API_CLIENT_SECRET=${{ secrets.AUTH0_MANAGEMENT_API_CLIENT_SECRET }}" >> .env
          echo "AUTH0_SCOPE=\"${{ secrets.AUTH0_SCOPE }}\"" >> .env
          echo "AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }}" >> .env
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> .env
          echo "CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}" >> .env
          echo "READ_PERMISSION=${{ secrets.READ_PERMISSION }}" >> .env
          echo "WRITE_PERMISSION=${{ secrets.WRITE_PERMISSION }}" >> .env
          echo "ADMIN_PERMISSION=${{ secrets.ADMIN_PERMISSION }}" >> .env
          echo "ADMIN_AUTH0_PERMISSION=${{ secrets.ADMIN_AUTH0_PERMISSION }}" >> .env
          echo "AUTH0_AUTOMATIC_PERMISSIONS=${{ secrets.AUTH0_AUTOMATIC_PERMISSIONS }}" >> .env

      - name: Generate wrangler.jsonc from .env
        run: |
          python3 scripts/generate-wrangler-jsonc.py .env apps/cloudflare-worker/wrangler.jsonc wrangler.jsonc
          cp wrangler.jsonc apps/cloudflare-worker/wrangler.jsonc
          cp secrets.json apps/cloudflare-worker/secrets.json 

      - name: Create encrypted artifact with .env, wrangler.jsonc and secrets.json
        run: |
          tar -czf env_and_wrangler.tar.gz \
            .env \
            apps/cloudflare-worker/wrangler.jsonc apps/cloudflare-worker/secrets.json
          openssl enc -aes-256-cbc -salt -in env_and_wrangler.tar.gz -out .env.enc -iter 10000 -pass pass:"${{ secrets.CRYPTOKEN }}"
          rm .env env_and_wrangler.tar.gz

      - name: Upload shared encrypted artifact
        uses: actions/upload-artifact@v6
        with:
          name: shared-env
          include-hidden-files: true
          path: .env.enc
